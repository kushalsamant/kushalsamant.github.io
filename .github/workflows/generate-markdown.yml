name: Generate Markdown and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "diagrams/**"
      - "tools/**"
      - "requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Markdown
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_API_URL: ${{ secrets.TOGETHER_API_URL }}
          TOGETHER_MODEL_ID: ${{ secrets.TOGETHER_MODEL_ID }}
          PROMPT_FILE: tools/diagram_prompt.txt
          IMAGE_EXTENSIONS: .jpg,.jpeg,.png
          DIAGRAMS_DIR: diagrams
          BATCH_SIZE: 5
        run: python tools/generate_markdown.py

      - name: Commit Generated Markdown (Rebase Safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git pull --rebase origin main

          if [ -n "$(git status --porcelain _diagrams)" ]; then
            git add _diagrams/
            git commit -m "Auto-generate diagram markdown"
            git push origin main
          else
            echo "No markdown changes to commit."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
