# Sample workflow for building and deploying a Jekyll site to GitHub Pages
# WITH diagram generation support
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # OPTIONAL: Uncomment to enable automated diagram generation
      # Requires setting up secrets: TOGETHER_API_KEY, TOGETHER_API_URL, TOGETHER_MODEL_ID
      # - name: Setup Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.11'
      # 
      # - name: Install Python dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt
      # 
      # - name: Generate diagram markdown
      #   env:
      #     TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      #     TOGETHER_API_URL: ${{ secrets.TOGETHER_API_URL }}
      #     TOGETHER_MODEL_ID: ${{ secrets.TOGETHER_MODEL_ID }}
      #     BASE_IMAGE_URL: https://www.kvshvl.in/diagrams
      #     PROMPT_FILE: tools/diagram_prompt.txt
      #     IMAGE_EXTENSIONS: .jpg,.jpeg,.png
      #     DIAGRAMS_DIR: diagrams
      #     BATCH_SIZE: 5
      #   run: python tools/generate_diagram_md.py
      #   continue-on-error: true
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
