name: SEO Integrity Check

on:
  push:
    branches: ["main"]

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Ensure Canonical Tags Exist
        run: |
          if ! grep -R "rel=\"canonical\"" ./_site; then
            echo "Missing canonical tags"
            exit 1
          fi

      - name: Ensure Robots.txt Exists
        run: |
          if [ ! -f "_site/robots.txt" ]; then
            echo "Missing robots.txt"
            exit 1
          fi
