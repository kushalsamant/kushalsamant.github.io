name: Deploy Jekyll with GitHub Pages – Smart Diagram Generation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      need_generation: ${{ steps.check.outputs.need_generation }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if relevant paths changed
        id: check
        run: |
          if git diff HEAD^ HEAD --quiet -- "diagrams/**" "tools/**" "requirements.txt"; then
            echo "need_generation=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_generation=true" >> "$GITHUB_OUTPUT"
          fi

  generate-diagrams:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.need_generation == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate diagram markdown
        env:
          TOGETHER_API_KEY:    ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_API_URL:    ${{ secrets.TOGETHER_API_URL }}
          TOGETHER_MODEL_ID:   ${{ secrets.TOGETHER_MODEL_ID }}
          BASE_IMAGE_URL:      https://www.kvshvl.in/diagrams
          PROMPT_FILE:         tools/diagram_prompt.txt
          IMAGE_EXTENSIONS:    .jpg,jpeg,png
          DIAGRAMS_DIR:        diagrams
          BATCH_SIZE:          5
        run: python tools/generate_diagram_md.py
        continue-on-error: true

      - name: Upload generated files (if any changed)
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagrams
          path: |
            _diagrams/
            diagrams/
          if-no-files-found: ignore
          retention-days: 1

  build-and-deploy:
    needs: [detect-changes, generate-diagrams]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download generated diagrams (if produced)
        if: ${{ needs.detect-changes.outputs.need_generation == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          name: generated-diagrams
          path: ./

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4