name: Generate Diagrams and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "diagrams/**"
      - "tools/**"
      - "requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Markdown
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_API_URL: ${{ secrets.TOGETHER_API_URL }}
          TOGETHER_MODEL_ID: ${{ secrets.TOGETHER_MODEL_ID }}
          BASE_IMAGE_URL: https://www.kvshvl.in/diagrams
          PROMPT_FILE: tools/diagram_prompt.txt
          IMAGE_EXTENSIONS: .jpg,jpeg,png
          DIAGRAMS_DIR: diagrams
          BATCH_SIZE: 5
        run: python tools/generate_diagram_md.py

      - name: Commit Generated Files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _diagrams/
          git commit -m "Auto-generate diagram markdown" || echo "No changes"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
