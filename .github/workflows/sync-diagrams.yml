name: Sync Diagrams (Markdown Follows Images)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Remove orphan markdown files
        run: |
          image_dir="diagrams"
          md_dir="_diagrams"

          echo "Scanning markdown files..."

          for md_path in "$md_dir"/*.md; do
            [ -e "$md_path" ] || continue

            base_name=$(basename "$md_path" .md)

            if [ ! -f "$image_dir/$base_name.jpg" ] && \
               [ ! -f "$image_dir/$base_name.png" ] && \
               [ ! -f "$image_dir/$base_name.webp" ]; then
              
              echo "Deleting orphan markdown: $md_path"
              rm -f "$md_path"
            fi
          done

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add _diagrams
            git commit -m "Remove orphan markdown files"
            git push || true
          else
            echo "No changes to commit."
          fi
