name: Sync Diagrams and Markdown

on:
  push:
    branches: [ main ]

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync diagrams and markdown
        run: |
          image_dir="diagrams"
          md_dir="_diagrams"

          echo "Scanning markdown files..."

          for md_path in "$md_dir"/*.md; do
            [ -e "$md_path" ] || continue

            base_name=$(basename "$md_path" .md)

            if [ ! -f "$image_dir/$base_name.jpg" ] && \
               [ ! -f "$image_dir/$base_name.png" ] && \
               [ ! -f "$image_dir/$base_name.webp" ]; then
              
              echo "Deleting orphan markdown: $md_path"
              rm -f "$md_path"
            fi
          done

          echo "Scanning image files..."

          for img_path in "$image_dir"/*; do
            [ -e "$img_path" ] || continue

            filename=$(basename "$img_path")
            base_name="${filename%.*}"

            if [ ! -f "$md_dir/$base_name.md" ]; then
              echo "Deleting orphan image: $img_path"
              rm -f "$img_path"
            fi
          done

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Sync diagrams and markdown files"
            git push
          else
            echo "No changes to commit."
          fi
