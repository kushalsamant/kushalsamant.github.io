name: Nightly Diagram Processing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Markdown
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_API_URL: ${{ secrets.TOGETHER_API_URL }}
          TOGETHER_MODEL_ID: ${{ secrets.TOGETHER_MODEL_ID }}
          PROMPT_FILE: tools/diagram_prompt.txt
          IMAGE_EXTENSIONS: .jpg,.jpeg,.png
          DIAGRAMS_DIR: diagrams
          BATCH_SIZE: 10
        run: python tools/generate_markdown.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _diagrams/
          git commit -m "Nightly generation update" || echo "No changes"
          git push
