name: Nightly Diagram Generation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Markdown
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          BASE_IMAGE_URL: https://www.kvshvl.in/diagrams
          PROMPT_FILE: tools/diagram_prompt.txt
          IMAGE_EXTENSIONS: .jpg,jpeg,png
          DIAGRAMS_DIR: diagrams
          BATCH_SIZE: 10
        run: python tools/generate_diagram_md.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _diagrams/
          git commit -m "Nightly generation update" || echo "No changes"
          git push
