name: Monthly Archive

on:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Archive snapshot
        run: |
          zip -r archive-$(date +%Y-%m).zip .

      - name: Commit archive
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.zip
          git commit -m "Monthly archive" || echo "No changes"
          git push
