name: Weekly Diagnostics Suite

on:
  schedule:
    - cron: "0 3 * * 0"   # Every Sunday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse Audit
        run: |
          mkdir -p lighthouse-report
          lighthouse https://www.kvshvl.in \
            --output html \
            --output-path lighthouse-report/report.html \
            --chrome-flags="--headless --no-sandbox"

      - name: Upload Lighthouse Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ github.run_id }}
          path: lighthouse-report/
          retention-days: 7
